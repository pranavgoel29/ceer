appId: com.ceer.app
productName: Ceer
copyright: Copyright © 2026
electronVersion: "35.7.5"
npmRebuild: false
artifactName: Ceer-${version}-${arch}.${ext}

publish:
  provider: github
  releaseType: release

directories:
  output: dist-out
  buildResources: resources

files:
  - dist-electron/**/*
  - package.json
  - "!**/*.map"

extraResources:
  - from: ../web/dist
    to: web
    filter:
      - "**/*"
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/icon.iconset/icon_16x16@2x.png
    to: tray-icon.png

asar: true

mac:
  category: public.app-category.video
  icon: resources/icon.icns
  target:
    - dmg
    - zip

dmg:
  title: Ceer

win:
  icon: resources/icon.ico
  target:
    - nsis
  sign: false
  # Embed icon + version metadata via rcedit; signing is skipped when no certificate is configured.
  signAndEditExecutable: true

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
